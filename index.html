<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ryder Dashboard</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
    margin:0;
    padding:30px;
}

h1{
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
}

.card{
    background:#1f1f1f;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.5);
    margin-top:30px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

.signup{
    background:#00b894;
    color:white;
}

.login{
    background:#0984e3;
    color:white;
}

#message{
    margin-top:20px;
    color:#55efc4;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>💰 Ryder Dashboard</h1>

<div class="container">

<div class="card">

<h2>Create Account</h2>

<input
id="signupEmail"
type="email"
placeholder="Email">

<input
id="signupPassword"
type="password"
placeholder="Password">

<button class="signup" onclick="signUp()">
Create Account
</button>

<hr>

<h2>Login</h2>

<input
id="loginEmail"
type="email"
placeholder="Email">

<input
id="loginPassword"
type="password"
placeholder="Password">

<button class="login" onclick="login()">
Login
</button>

<p id="message"></p>

</div>

</div>

<!-- Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ===============================
// SUPABASE CONNECTION
// ===============================

const SUPABASE_URL = "https://mhmanuouzwvimpzggltb.supabase.co";

const SUPABASE_KEY = "YOUR_ANON_KEY_HERE";

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

console.log("✅ Supabase client created");

// ===============================
// DATABASE CONNECTION TEST
// ===============================

async function testConnection(){

    const { data, error } = await supabase
        .from("wallet")
        .select("*");

    console.log("Database Test");
    console.log(data);
    console.log(error);

}

testConnection();


// ===============================
// CREATE ACCOUNT
// ===============================

async function signUp(){

    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;

    const message = document.getElementById("message");

    const { data, error } = await supabase.auth.signUp({

        email: email,
        password: password

    });

    if(error){

        message.style.color = "#ff7675";
        message.textContent = error.message;
        console.error(error);

        return;
    }

    message.style.color = "#55efc4";
    message.textContent =
    "✅ Account created! Check your email to verify your account.";

    console.log(data);

}


// ===============================
// LOGIN
// ===============================

async function login(){

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const message = document.getElementById("message");

    const { data, error } =
    await supabase.auth.signInWithPassword({

        email: email,
        password: password

    });

    if(error){

        message.style.color = "#ff7675";
        message.textContent = error.message;
        console.error(error);

        return;
    }

    message.style.color = "#55efc4";
    message.textContent = "✅ Login successful!";

    console.log(data);

}

</script>

</body>
</html>
