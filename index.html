<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ryder Dashboard</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
    margin:0;
    padding:30px;
}

h1{
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
}

.card{
    background:#1f1f1f;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.5);
    margin-top:30px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{

    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;

}

.signup{
    background:#00b894;
    color:white;
}

.login{
    background:#0984e3;
    color:white;
}

#message{

    margin-top:20px;
    color:#55efc4;

}


</style>

</head>


<body>


<h1>💰 Ryder Dashboard</h1>


<div class="container">


<div class="card">

<h2>Create Account</h2>


<input 
id="signupEmail"
type="email"
placeholder="Email">


<input 
id="signupPassword"
type="password"
placeholder="Password">


<button class="signup" onclick="signUp()">
Create Account
</button>



<hr>



<h2>Login</h2>


<input 
id="loginEmail"
type="email"
placeholder="Email">


<input 
id="loginPassword"
type="password"
placeholder="Password">


<button class="login" onclick="login()">
Login
</button>


<p id="message"></p>


</div>


</div>
